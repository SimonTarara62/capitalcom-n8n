name: Feature request
description: Suggest a new operation, parameter, or capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: The operation, field, or behaviour you'd like.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
